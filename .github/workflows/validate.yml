name: Validate application

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: validate-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      AUTH_SECRET: ci-auth-secret-ci-auth-secret-ci-auth-secret
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      OPENAI_API_KEY: ci-placeholder
      DEEPSEEK_API_KEY: ci-placeholder
      AI_GATEWAY_API_KEY: ci-placeholder
      NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
      NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ci-placeholder
      BLOB_READ_WRITE_TOKEN: ci-placeholder
      POSTGRES_URL: postgresql://postgres:postgres@localhost:5432/postgres
      REDIS_URL: redis://localhost:6379

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@9.12.3 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm build
