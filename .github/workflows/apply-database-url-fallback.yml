name: Apply database URL compatibility

on:
  push:
    paths:
      - .github/workflows/apply-database-url-fallback.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/runtime-500-database

      - name: Apply targeted replacements
        run: |
          python <<'PY'
          from pathlib import Path

          queries = Path('lib/db/queries.ts')
          text = queries.read_text()
          text = text.replace(
              "import postgres from 'postgres';\n",
              "import postgres from 'postgres';\nimport { getDatabaseUrl } from './database-url';\n",
              1,
          )
          text = text.replace(
              "// biome-ignore lint: Forbidden non-null assertion.\nconst client = postgres(process.env.POSTGRES_URL!);",
              "const client = postgres(getDatabaseUrl(), {\n  max: 1,\n  prepare: false,\n  connect_timeout: 10,\n  idle_timeout: 20,\n});",
              1,
          )
          queries.write_text(text)

          ingest = Path('lib/db/ingest.ts')
          text = ingest.read_text()
          text = text.replace(
              "import { generateEmbedding } from '../ai/local-vectorizer';\n",
              "import { generateEmbedding } from '../ai/local-vectorizer';\nimport { getDatabaseUrl } from './database-url';\n",
              1,
          )
          text = text.replace(
              "const connectionString = process.env.POSTGRES_URL;\nif (!connectionString) {\n  console.error('CRITICAL: POSTGRES_URL environment variable is missing.');\n  process.exit(1);\n}\n\nconst client = postgres(connectionString, { max: 1 });",
              "const client = postgres(getDatabaseUrl(), {\n  max: 1,\n  prepare: false,\n  connect_timeout: 15,\n  idle_timeout: 20,\n});",
              1,
          )
          ingest.write_text(text)

          drizzle = Path('drizzle.config.ts')
          text = drizzle.read_text()
          text = text.replace(
              "import { defineConfig } from 'drizzle-kit';\n",
              "import { defineConfig } from 'drizzle-kit';\nimport { getDatabaseUrl } from './lib/db/database-url';\n",
              1,
          )
          text = text.replace(
              "    // biome-ignore lint: Forbidden non-null assertion.\n    url: process.env.POSTGRES_URL!,",
              "    url: getDatabaseUrl(),",
              1,
          )
          drizzle.write_text(text)
          PY

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add lib/db/queries.ts lib/db/ingest.ts drizzle.config.ts
          git commit -m "fix: use Neon or Vercel database URL consistently"
          git push origin HEAD:fix/runtime-500-database
