name: Regenerate dependency lock

on:
  push:
    paths:
      - package.json
  pull_request:
    paths:
      - package.json

permissions:
  contents: write

jobs:
  regenerate-lockfile:
    runs-on: ubuntu-latest
    steps:
      - name: Check out source branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@9.12.3 --activate

      - name: Regenerate lockfile
        run: pnpm install --lockfile-only --no-frozen-lockfile

      - name: Verify framework versions
        run: |
          node -e "const p=require('./package.json'); if(p.dependencies.next!=='15.3.9'||p.dependencies.react!=='19.0.1'||p.dependencies['react-dom']!=='19.0.1') process.exit(1)"

      - name: Commit updated lockfile
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add pnpm-lock.yaml
          if git diff --cached --quiet; then
            echo "Lockfile already up to date"
          else
            git commit -m "chore: regenerate dependency lockfile"
            git push origin HEAD:${{ github.head_ref || github.ref_name }}
          fi
