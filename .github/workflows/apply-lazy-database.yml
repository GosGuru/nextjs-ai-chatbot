name: Apply lazy database initialization

on:
  push:
    paths:
      - .github/workflows/apply-lazy-database.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/runtime-500-database

      - name: Refactor database initialization
        run: |
          python <<'PY'
          from pathlib import Path

          path = Path('lib/db/queries.ts')
          text = path.read_text()

          old = """const client = postgres(getDatabaseUrl(), {
            max: 1,
            prepare: false,
            connect_timeout: 10,
            idle_timeout: 20,
          });
          const db = drizzle(client);
          """

          new = """type Database = ReturnType<typeof drizzle>;
          let database: Database | undefined;

          function getDb() {
            if (!database) {
              const client = postgres(getDatabaseUrl(), {
                max: 1,
                prepare: false,
                connect_timeout: 10,
                idle_timeout: 20,
              });

              database = drizzle(client);
            }

            return database;
          }
          """

          if old not in text:
            raise SystemExit('Expected database initialization block was not found')

          text = text.replace(old, new, 1)
          text = text.replace('db.', 'getDb().')
          path.write_text(text)
          PY

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add lib/db/queries.ts
          git commit -m "fix: initialize database connections lazily"
          git push origin HEAD:fix/runtime-500-database
