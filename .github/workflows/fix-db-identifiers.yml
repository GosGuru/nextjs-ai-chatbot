name: Fix remaining database references

on:
  push:
    paths:
      - .github/workflows/fix-db-identifiers.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/runtime-500-database

      - name: Replace remaining database identifiers
        run: |
          python <<'PY'
          from pathlib import Path
          import re

          path = Path('lib/db/queries.ts')
          text = path.read_text()
          text = re.sub(r'\bdb\b', 'getDb()', text)
          path.write_text(text)
          PY

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add lib/db/queries.ts
          git commit -m "fix: route all database queries through lazy connection"
          git push origin HEAD:fix/runtime-500-database
